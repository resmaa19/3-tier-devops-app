name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image namespace
        run: |
          IMAGE_NAMESPACE=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAMESPACE=$IMAGE_NAMESPACE" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:latest

      - name: Set up kubectl
        if: ${{ env.KUBE_CONFIG_B64 != '' }}
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        if: ${{ env.KUBE_CONFIG_B64 != '' }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG_B64" | base64 -d > ~/.kube/config

      - name: Deploy to Kubernetes
        if: ${{ env.KUBE_CONFIG_B64 != '' }}
        run: |
          sed -i "s|ghcr.io/OWNER/REPOSITORY/backend:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:${{ github.sha }}|g" k8s/backend.yaml
          sed -i "s|ghcr.io/OWNER/REPOSITORY/frontend:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:${{ github.sha }}|g" k8s/frontend.yaml
          kubectl apply -k k8s
          kubectl rollout status deployment/backend -n devops-3tier
          kubectl rollout status deployment/frontend -n devops-3tier
